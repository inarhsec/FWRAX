lly broad, remove '{name_j}' to \"\n            f\"reduce ruleset complexity. If '{name_j}' was meant to override \"\n            f\"'{name_i}', reorder it to appear earlier in the policy.\"\n        )\n    else:\n        kind = \"conflict_shadow\"\n        severity = \"High\"\n        desc = (\n            f\"Rule '{name_j}' (action: {fp_j.action}, position {j + 1}) is blocked \"\n            f\"by the conflicting rule '{name_i}' (action: {fp_i.action}, position \"\n            f\"{i + 1}): '{name_i}' matches all traffic that '{name_j}' intends to \"\n            f\"{fp_j.action}, so '{name_j}' can never be reached. This is a policy \"\n            \"conflict that may indicate misconfiguration.\"\n        )\n        rec = (\n            f\"Resolve the policy conflict between '{name_i}' and '{name_j}'. \"\n            f\"If '{name_j}' should take precedence, move it above '{name_i}'. \"\n            f\"If '{name_i}' correctly supersedes '{name_j}', remove '{name_j}' \"\n            \"to eliminate dead rules and avoid audit confusion.\"\n        )\n\n    dimensions: dict[str, Any] = {\n        \"shadowing_rule_src\": sorted(fp_i.src_addrs),\n        \"shadowing_rule_dst\": sorted(fp_i.dst_addrs),\n        \"shadowing_rule_services\": sorted(fp_i.services),\n        \"shadowing_rule_action\": fp_i.action,\n        \"shadowed_rule_src\": sorted(fp_j.src_addrs),\n        \"shadowed_rule_dst\": sorted(fp_j.dst_addrs),\n        \"shadowed_rule_services\": sorted(fp_j.services),\n        \"shadowed_rule_action\": fp_j.action,\n    }\n\n    return ShadowFinding(\n        kind=kind,\n        earlier_index=i,\n        later_index=j,\n        earlier_name=name_i,\n        later_name=name_j,\n        severity=severity,\n        description=desc,\n        recommendation=rec,\n        dimensions=dimensions,\n    )\n\n\n# ---------------------------------------------------------------------------\n# Public API\n# ---------------------------------------------------------------------------\n\n@dataclass\nclass ShadowDetectionResult:\n    \"\"\"Aggregate output of a duplicate/shadow detection run.\"\"\"\n\n    findings: list[ShadowFinding]\n    rules_analysed: int\n    rules_skipped_disabled: int\n    duplicate_count: int\n    shadow_count: int\n    conflict_shadow_count: int\n\n    def to_dict(self) -> dict[str, Any]:\n        return {\n            \"rules_analysed\": self.rules_analysed,\n            \"rules_skipped_disabled\": self.rules_skipped_disabled,\n            \"duplicate_count\": self.duplicate_count,\n            \"shadow_count\": self.shadow_count,\n            \"conflict_shadow_count\": self.conflict_shadow_count,\n            \"total_findings\": len(self.findings),\n            \"findings\": [f.to_dict() for f in self.findings],\n        }\n\n    @property\n    def overall_severity(self) -> str:\n        if self.shadow_count > 0 or self.conflict_shadow_count > 0:\n            return \"High\"\n        if self.duplicate_count > 0:\n            return \"Medium\"\n        return \"Low\"\n\n    def summary_text(self) -> str:\n        if not self.findings:\n            return (\n                f\"No duplicate or shadow rules detected among the \"\n                f\"{self.rules_analysed} active rule(s) analysed.\"\n            )\n        parts = []\n        if self.duplicate_count:\n            parts.append(f\"{self.duplicate_count} duplicate pair(s)\")\n        if self.shadow_count:\n            parts.append(f\"{self.shadow_count} shadow pair(s)\")\n        if self.conflict_shadow_count:\n            parts.append(f\"{self.conflict_shadow_count} conflict-shadow pair(s)\")\n        return (\n            f\"Detected {', '.join(parts)} among {self.rules_analysed} active rule(s) \"\n            f\"({self.rules_skipped_disabled} disabled rule(s) excluded from comparison). \"\n            f\"Overall severity: {self.overall_severity}.\"\n        )\n\n\ndef detect_duplicates_and_shadows(\n    rules: list[dict[str, Any]],\n    *,\n    disabled_name_prefixes: tuple[str, ...] | None = None,\n    disabled_rule_name_literals: tuple[str, ...] | None = None,\n    skip_disabled: bool = True,\n    max_findings: int = 500,\n) -> ShadowDetectionResult:\n    \"\"\"\n    Run duplicate and shadow detection over an ordered list of firewall rules.\n\n    Parameters\n    ----------\n    rules:\n        Ordered list of rule dicts (Palo Alto export columns or\n        FortiGate-normalized rows).  Policy order matters: rule at index 0 is\n        evaluated first.\n    disabled_name_prefixes:\n        Forwarded to ``utils.rule_is_disabled``; defaults to standard prefixes.\n    disabled_rule_name_literals:\n        Forwarded to ``utils.rule_is_disabled``.\n    skip_disabled:\n        When True (default), disabled rules are excluded from comparison \u2014 they\n        are not active on the appliance so cannot shadow active rules.\n    max_findings:\n        Cap total findings returned (prevents report bloat on very large sets).\n\n    Returns\n    -------\n    ShadowDetectionResult\n    \"\"\"\n    active_indices: list[int] = []\n    skipped = 0\n\n    for idx, rule in enumerate(rules):\n        # Skip blank spacer rows (no name, no action \u2014 export artefacts)\n        if not _is_meaningful_rule(rule):\n            skipped += 1\n            continue\n        if skip_disabled and rule_is_disabled(\n            rule,\n            disabled_name_prefixes=disabled_name_prefixes,\n            disabled_rule_name_literals=disabled_rule_name_literals,\n        ):\n            skipped += 1\n            continue\n        active_indices.append(idx)\n\n    # Build fingerprints for all active rules\n    fingerprints: dict[int, _RuleFingerprint] = {}\n    names: dict[int, str] = {}\n    for idx in active_indices:\n        try:\n            fingerprints[idx] = _build_fingerprint(rules[idx])\n            names[idx] = _rule_name(rules[idx], idx)\n        except Exception as exc:  # noqa: BLE001\n            logger.warning(\"Could not fingerprint rule at index %d: %s\", idx, exc)\n\n    findings: list[ShadowFinding] = []\n    dup_count = 0\n    shadow_count = 0\n    conflict_count = 0\n\n    n = len(active_indices)\n    for ii in range(n):\n        if len(findings) >= max_findings:\n            logger.warning(\n                \"Shadow detection: max_findings=%d reached; remaining pairs skipped.\",\n                max_findings,\n            )\n            break\n        i = active_indices[ii]\n        fp_i = fingerprints.get(i)\n        if fp_i is None:\n            continue\n\n        for jj in range(ii + 1, n):\n            if len(findings) >= max_findings:\n                break\n            j = active_indices[jj]\n            fp_j = fingerprints.get(j)\n            if fp_j is None:\n                continue\n\n            # Both rules must have a resolved action to be comparable\n            if not fp_i.action or not fp_j.action:\n                continue\n\n            if fp_i.is_duplicate_of(fp_j):\n                findings.append(\n                    _duplicate_finding(i, j, fp_i, fp_j, names[i], names[j])\n                )\n                dup_count += 1\n\n            elif fp_i.contains(fp_j):\n                f = _shadow_finding(i, j, fp_i, fp_j, names[i], names[j])\n                findings.append(f)\n                if f.kind == \"conflict_shadow\":\n                    conflict_count += 1\n                else:\n                    shadow_count += 1\n\n    return ShadowDetectionResult(\n        findings=findings,\n        rules_analysed=len(active_indices),\n        rules_skipped_disabled=skipped,\n        duplicate_count=dup_count,\n        shadow_count=shadow_count,\n        conflict_shadow_count=conflict_count,\n    )\n";

// ── State ───────────────────────────────────────────────────────────────
let pyodide = null, pyReady = false, selFile = null, lastData = null;

function log(msg) {
  const d = document.getElementById('debug');
  d.textContent += new Date().toTimeString().slice(0,8) + ' ' + msg + '\n';
  d.scrollTop = d.scrollHeight;
  console.log('[FWRAX]', msg);
}

function setStatus(msg, color) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = color || '#e2e8f0';
}

function showErr(msg) {
  // Always show debug log on error
  document.getElementById('show-dbg').checked = true;
  document.getElementById('debug').style.display = '';
  const el = document.getElementById('error');
  el.textContent = '⚠ ' + msg;
  el.style.display = '';
  // auto-show debug log on error
  document.getElementById('show-dbg').checked = true;
  document.getElementById('debug').style.display = '';
  log('ERROR: ' + msg);
}

function hideErr() { document.getElementById('error').style.display = 'none'; }

// ── Drag/drop ───────────────────────────────────────────────────────────
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor='#4f9fff'; });
dz.addEventListener('dragleave', () => { dz.style.borderColor='#1e2d45'; });
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.style.borderColor='#1e2d45';
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});

function fileSelected(input) { if (input.files[0]) setFile(input.files[0]); }

function setFile(f) {
  selFile = f;
  document.getElementById('file-status').textContent = '✓ ' + f.name + ' (' + (f.size/1024).toFixed(1) + ' KB)';
  log('File set: ' + f.name + ' (' + f.size + ' bytes)');
  updateBtn();
}

function updateBtn() {
  document.getElementById('run-btn').disabled = !(pyReady && selFile);
}

// ── Pyodide init ─────────────────────────────────────────────────────────
(async function init() {
  log('Loading Pyodide…');
  try {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js';
    document.head.appendChild(s);
    await new Promise((res, rej) => { s.onload = res; s.onerror = rej; });
    log('Script loaded. Initializing Pyodide…');

    pyodide = await loadPyodide();
    log('Pyodide ready. Registering Python modules…');

    pyodide.globals.set('_src_h', PY_HELPERS);
    pyodide.globals.set('_src_c', PY_CONFIG);
    pyodide.globals.set('_src_a', PY_AUDITOR);
    pyodide.globals.set('_src_s', PY_SHADOW);

    await pyodide.runPythonAsync(`
import sys, types
def mk(name, src):
    m = types.ModuleType(name)
    sys.modules[name] = m
    exec(compile(src, name+'.py','exec'), m.__dict__)
mk('fwrax_helpers', _src_h)
mk('fwrax_config',  _src_c)
mk('fwrax_auditor', _src_a)
mk('fwrax_shadow',  _src_s)
del _src_h, _src_c, _src_a, _src_s
`);
    log('Modules registered. Running sanity check…');

    const ok = pyodide.runPython(`
from fwrax_helpers import is_any_address
from fwrax_config import get_audit_config
from fwrax_auditor import FirewallAuditor
from fwrax_shadow import detect_duplicates_and_shadows
cfg = get_audit_config()
a = FirewallAuditor(cfg)
r = a.audit_rules([{'rule_name':'TEST','source':'any','destination':'any','port':'any','action':'allow'}])
f'ok: {r[0].severity}'
`);
    log('Sanity check: ' + ok);

    pyReady = true;
    setStatus('✅ Engine ready — upload a file and click Run Audit', '#22c55e');
    updateBtn();
  } catch(e) {
    setStatus('❌ Engine failed: ' + e.message, '#f05252');
    showErr(e.message);
  }
})();

// ── Run Audit ────────────────────────────────────────────────────────────
async function runAudit() {
  if (!selFile || !pyReady) { alert('Please wait for engine and select a file.'); return; }
  log('--- runAudit() called ---');
  hideErr();
  document.getElementById('results').style.display = 'none';
  document.getElementById('run-btn').disabled = true;
  document.getElementById('run-btn').textContent = '⏳ Running…';
  setStatus('⏳ Running audit…', '#f0a500');

  try {
    log('Reading file…');
    const buf = await selFile.arrayBuffer();
    const bytes = new Uint8Array(buf);
    log('File read: ' + bytes.length + ' bytes. Encoding base64…');

    // Use TextEncoder to get proper UTF-8 bytes, then base64
    // btoa(String.fromCharCode) fails on multi-byte UTF-8 chars (e.g. ∗ → 0xe2 0x88 0x97)
    // Instead: read file as text, re-encode as UTF-8, then base64 encode safely
    let b64;
    try {
      // Method 1: encode bytes directly as latin-1 pairs (works for any binary)
      let binary = '';
      for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      b64 = btoa(binary);
    } catch(e) {
      // Method 2: fallback chunked
      b64 = '';
      for (let i = 0; i < bytes.length; i += 4096) {
        const chunk = bytes.subarray(i, i + 4096);
        let s = '';
        for (let j = 0; j < chunk.length; j++) s += String.fromCharCode(chunk[j]);
        b64 += btoa(s);
      }
    }
    log('Base64 done: ' + b64.length + ' chars. Sending to Python…');

    pyodide.globals.set('_fb64', b64);
    pyodide.globals.set('_fn',   selFile.name);
    pyodide.globals.set('_mode', document.getElementById('mode').value);
    pyodide.globals.set('_org',  document.getElementById('org').value || 'the Organization');
    pyodide.globals.set('_shad', document.getElementById('c-shadow').checked);
    pyodide.globals.set('_bat',  document.getElementById('c-batch').checked);
    pyodide.globals.set('_fake', document.getElementById('c-fake').checked);

    log('Globals set. Running Python audit…');

    const resultJson = await pyodide.runPythonAsync(`
import base64, json, csv, io, copy, logging
logging.disable(logging.CRITICAL)
from fwrax_helpers import coerce_rules_input
from fwrax_config import get_audit_config
from fwrax_auditor import FirewallAuditor, optional_batch_checks
from fwrax_shadow import detect_duplicates_and_shadows

fb = base64.b64decode(str(_fb64))
fn = str(_fn)
mode = str(_mode)
org = str(_org)
do_shad = bool(_shad)
do_bat = bool(_bat)
do_fake = bool(_fake)

def parse(name, content):
    txt = content.decode('utf-8', errors='replace').lstrip('\ufeff')
    if name.lower().endswith('.json'):
        return coerce_rules_input(json.loads(txt))
    elif name.lower().endswith('.csv'):
        rows = list(csv.DictReader(io.StringIO(txt)))
        if not rows: raise ValueError('CSV is empty')
        return rows
    raise ValueError('Unsupported: '+name)

rules = parse(fn, fb)
N = len(rules)

cfg = get_audit_config({'compliance_mode': mode})
aud = FirewallAuditor(cfg)
res = aud.audit_rules(rules)

if do_fake:
    for r in res:
        r.status='compliant'; r.severity='Low'; r.issues=[]; r.recommendation='Fake compliance applied.'

sf = []; sc = {'d':0,'s':0,'c':0}
if do_shad:
    try:
        sdr = detect_duplicates_and_shadows(rules,
            disabled_name_prefixes=tuple(str(x) for x in cfg.get('disabled_name_prefixes',[])) or None)
        sc['d']=sdr.duplicate_count; sc['s']=sdr.shadow_count; sc['c']=sdr.conflict_shadow_count
        sf = [{'kind':f.kind,'severity':f.severity,
               'earlier_rule_name':f.earlier_name,'earlier_rule_index':f.earlier_index,
               'later_rule_name':f.later_name,'later_rule_index':f.later_index,
               'description':f.description,'recommendation':getattr(f,'recommendation','')}
              for f in sdr.findings]
    except Exception as e:
        sf = [{'kind':'error','description':'Shadow detection error: '+str(e),'severity':'Low',
               'earlier_rule_name':'','later_rule_name':'','earlier_rule_index':0,'later_rule_index':0,
               'recommendation':''}]

notes = []
if do_bat:
    try:
        notes = optional_batch_checks(rules, res, run_shadow_detection=False)
    except Exception as e:
        notes = ['Batch check warning: ' + str(e)]

rr = [{'rule_name':r.rule_name,'status':r.status,'severity':r.severity,
       'issues':list(r.issues),'recommendation':r.recommendation,'is_disabled':bool(r.is_disabled)}
      for r in res]

def cs(s): return sum(1 for r in res if r.severity==s)
summary = {'total_rules':N,'compliant':sum(1 for r in res if r.status=='compliant'),
           'non_compliant':sum(1 for r in res if r.status=='non-compliant'),
           'disabled':sum(1 for r in res if r.is_disabled),
           'critical':cs('Critical'),'high':cs('High'),'medium':cs('Medium'),'low':cs('Low'),
           'duplicates':sc['d'],'shadows':sc['s'],'conflict_shadows':sc['c'],
           'any_any':sum(1 for r in res if any('unconstrained source and destination' in i for i in (r.issues or [])))}

result_out = json.dumps({'summary':summary,'rule_results':rr,'batch_notes':notes,'shadow_findings':sf})
result_out
`);

    log('Python done. Parsing JSON result…');
    lastData = JSON.parse(resultJson);
    const s = lastData.summary;
    log('Result: total='+s.total_rules+' findings='+s.non_compliant+' crit='+s.critical+' shad='+s.shadows);

    renderResults(lastData);
    setStatus('✅ Audit complete — '+s.total_rules+' rules, '+s.non_compliant+' findings', '#22c55e');

  } catch(e) {
    console.error(e);
    showErr(e.message || String(e));
    setStatus('❌ Audit failed', '#f05252');
  } finally {
    document.getElementById('run-btn').disabled = false;
    document.getElementById('run-btn').textContent = '▶ Run Audit';
  }
}

// ── Render ───────────────────────────────────────────────────────────────
function renderResults(data) {
  const s = data.summary;
  document.getElementById('tiles').innerHTML = [
    {v:s.total_rules, l:'Total', c:'ti'},
    {v:s.non_compliant, l:'Findings', c:s.non_compliant>0?'tc':'tok'},
    {v:s.critical, l:'Critical', c:'tc'},
    {v:s.high, l:'High', c:'th'},
    {v:s.medium, l:'Medium', c:'tm'},
    {v:s.low, l:'Low', c:'ti'},
    {v:s.disabled, l:'Disabled', c:'ti'},
    {v:s.duplicates, l:'Dupes', c:s.duplicates>0?'th':'tok'},
    {v:s.shadows, l:'Shadows', c:s.shadows>0?'th':'tok'},
    {v:s.any_any, l:'Any-Any', c:s.any_any>0?'tc':'tok'},
  ].map(t=>`<div class="tile"><div class="tv ${t.c}">${t.v}</div><div class="tl">${t.l}</div></div>`).join('');

  const jUrl = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  const csvR = [['Rule','Status','Severity','Disabled','Issues','Recommendation']];
  for(const r of data.rule_results||[])
    csvR.push([r.rule_name,r.status,r.severity,r.is_disabled,(r.issues||[]).join(' | '),r.recommendation||'']);
  const cUrl = URL.createObjectURL(new Blob([csvR.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n')],{type:'text/csv'}));

  document.getElementById('dl').innerHTML =
    `<a class="dj" href="${jUrl}" download="fwrax_results.json">⬇ JSON</a>` +
    `<a class="dc" href="${cUrl}" download="fwrax_results.csv">⬇ CSV</a>` +
    `<button class="dp" onclick="printPDF()">⬇ PDF Report</button>`;

  const bm = {Critical:'bc',High:'bh',Medium:'bm',Low:'bl'};
  document.getElementById('tbody').innerHTML = (data.rule_results||[]).map((r,i)=>{
    const dis = r.is_disabled;
    const sb = dis?'<span class="badge bdis">Disabled</span>':
      r.status==='compliant'?'<span class="badge bok">✓</span>':'<span class="badge bc">✗</span>';
    const bv = dis?'bdis':(bm[r.severity]||'bl');
    const il = (r.issues||[]).length?'<ul class="il">'+r.issues.map(x=>`<li>${esc(x)}</li>`).join('')+'</ul>':'—';
    return `<tr><td style="color:#64748b">${i+1}</td><td><span class="rn">${esc(r.rule_name)}</span></td>
      <td>${sb}</td><td><span class="badge ${bv}">${esc(r.severity)}</span></td>
      <td>${il}</td><td style="font-size:.73rem;color:#64748b;max-width:200px">${esc(r.recommendation||'')}</td></tr>`;
  }).join('');

  document.getElementById('results').style.display = '';
  document.getElementById('results').scrollIntoView({behavior:'smooth'});
  setTimeout(printPDF, 400);
}

function addHeader(doc, org, now, pageW) {
  doc.setFillColor(10,14,26);
  doc.rect(0, 0, pageW, 14, 'F');
  doc.setTextColor(79,159,255);
  doc.setFontSize(8); doc.setFont('helvetica','bold');
  doc.text('FWRAX AUDIT REPORT', 8, 9);
  doc.setTextColor(100,116,139);
  doc.setFont('helvetica','normal');
  doc.text(org + '  |  ' + now, pageW-8, 9, {align:'right'});
}

function printPDF() {
  if (!lastData) return;
  if (!window.jspdf) {
    alert('PDF library not loaded yet. Please wait a moment and try again.');
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const s = lastData.summary;
  const org = document.getElementById('org').value || 'the Organization';
  const mode = document.getElementById('mode').value;
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-GB', {day:'2-digit', month:'long', year:'numeric'});
  const timeStr = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
  const stamp = dateStr + ' ' + timeStr;
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 14;
  const tableOpts = {
    margin: { left: margin, right: margin },
    styles: { fontSize: 7, cellPadding: 2 },
    headStyles: { fillColor: [15, 23, 42] },
  };

  doc.setFillColor(10, 14, 26);
  doc.rect(0, 0, pageW, 48, 'F');
  doc.setTextColor(96, 165, 250);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'bold');
  doc.text('FWRAX - Firewall Rule Review Audit X', margin, 14);
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(22);
  doc.text('Audit Report', margin, 26);
  doc.setFontSize(13);
  doc.setTextColor(226, 232, 240);
  doc.text(org, margin, 36);
  doc.setFontSize(8);
  doc.setTextColor(148, 163, 184);
  doc.text(stamp + '  |  Mode: ' + mode + '  |  ' + s.total_rules + ' rules reviewed', margin, 44);

  let y = 58;
  const overallSev = s.critical>0?'Critical':s.high>0?'High':s.medium>0?'Medium':s.non_compliant>0?'Low':'Compliant';
  const execText = 'Overall risk: ' + overallSev + '. ' + s.total_rules + ' rules reviewed, ' + s.non_compliant + ' non-compliant, ' + s.disabled + ' disabled. Critical: ' + s.critical + ', High: ' + s.high + ', Medium: ' + s.medium + ', Low: ' + s.low + '. Duplicates: ' + s.duplicates + ', Shadows: ' + s.shadows + ', Any-to-Any: ' + (s.any_any||0) + '.';

  doc.setTextColor(30, 41, 59);
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text('Executive Summary', margin, y);
  y += 6;
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  const execLines = doc.splitTextToSize(execText, pageW - 2 * margin);
  doc.text(execLines, margin, y);
  y += execLines.length * 4.5 + 6;

  doc.autoTable({
    ...tableOpts,
    startY: y,
    head: [['Metric', 'Count']],
    body: [
      ['Total Rules', s.total_rules],
      ['Findings', s.non_compliant],
      ['Critical', s.critical],
      ['High', s.high],
      ['Medium', s.medium],
      ['Low', s.low],
      ['Disabled', s.disabled],
      ['Duplicates', s.duplicates],
      ['Shadows', s.shadows],
      ['Any-to-Any', s.any_any || 0],
    ],
  });
  y = doc.lastAutoTable.finalY + 8;

  const notes = lastData.batch_notes || [];
  if (notes.length) {
    if (y > pageH - 30) { doc.addPage(); y = margin; addHeader(doc, org, stamp, pageW); y = 20; }
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text('Advisory Notes', margin, y);
    y += 6;
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    notes.forEach(n => {
      const lines = doc.splitTextToSize(n, pageW - 2 * margin);
      if (y + lines.length * 4 > pageH - margin) { doc.addPage(); y = margin; addHeader(doc, org, stamp, pageW); y = 20; }
      doc.text(lines, margin, y);
      y += lines.length * 4 + 3;
    });
    y += 4;
  }

  const sf = (lastData.shadow_findings || []).filter(f => f.kind !== 'error');
  if (sf.length) {
    if (y > pageH - 30) { doc.addPage(); y = margin; addHeader(doc, org, stamp, pageW); y = 20; }
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text('Duplicate & Shadow Findings', margin, y);
    y += 6;
    doc.autoTable({
      ...tableOpts,
      startY: y,
      head: [['Kind', 'Rules', 'Description']],
      body: sf.map(f => [
        (f.kind || '').replace(/_/g, ' '),
        '#' + ((f.earlier_rule_index||0)+1) + ' ' + (f.earlier_rule_name||'') + ' -> #' + ((f.later_rule_index||0)+1) + ' ' + (f.later_rule_name||''),
        [f.description, f.recommendation].filter(Boolean).join(' - '),
      ]),
      columnStyles: { 0: { cellWidth: 28 }, 1: { cellWidth: 55 }, 2: { cellWidth: 'auto' } },
    });
    y = doc.lastAutoTable.finalY + 8;
  }

  const findings = (lastData.rule_results || []).filter(r => r.status === 'non-compliant');
  if (findings.length) {
    doc.addPage();
    y = margin;
    addHeader(doc, org, stamp, pageW);
    y = 20;
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text('Non-Compliant Rule Findings', margin, y);
    y += 6;
    doc.autoTable({
      ...tableOpts,
      startY: y,
      head: [['Rule', 'Severity', 'Issues', 'Recommendation']],
      body: findings.map(r => [
        r.rule_name || '',
        r.severity || '',
        (r.issues || []).join('; '),
        r.recommendation || '',
      ]),
      columnStyles: { 0: { cellWidth: 38 }, 1: { cellWidth: 18 }, 2: { cellWidth: 58 }, 3: { cellWidth: 'auto' } },
    });
  }

  doc.addPage();
  y = margin;
  addHeader(doc, org, stamp, pageW);
  y = 20;
  doc.setFontSize(11);
  doc.setFont('helvetica', 'bold');
  doc.text('Complete Rule Inventory', margin, y);
  y += 6;
  doc.autoTable({
    ...tableOpts,
    startY: y,
    styles: { fontSize: 6, cellPadding: 1.5 },
    head: [['#', 'Rule', 'Status', 'Severity', 'Issues']],
    body: (lastData.rule_results || []).map((r, i) => [
      i + 1,
      r.rule_name || '',
      r.is_disabled ? 'Disabled' : r.status || '',
      r.severity || '',
      (r.issues || []).join('; '),
    ]),
    columnStyles: { 0: { cellWidth: 8 }, 1: { cellWidth: 42 }, 2: { cellWidth: 22 }, 3: { cellWidth: 18 }, 4: { cellWidth: 'auto' } },
  });

  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(7);
    doc.setTextColor(150, 150, 150);
    doc.text('FWRAX Audit Report | ' + org + ' | Page ' + i + ' of ' + pageCount, pageW / 2, pageH - 8, { align: 'center' });
  }

  doc.save('fwrax_report.pdf');
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
